# Experiment: how does LOM performance scale with codebook size?
#
# Sweeps num_options over a wide range with multiple seeds.
# All other hyperparameters are held fixed.

sweep:
  num_options_list: [4, 16, 64, 256, 1024, 4096, 16384]
  seeds: [0, 1, 2]

data:
  dataset: nld-nao
  index_path: /scratch/uceeepi/lom/datasets/nle/nao/index.npz
  context_len: 4
  horizon: 128

model:
  latent_dim: 512
  patch_size: 4
  predict_sequence: false

train:
  ckpt_dir: /scratch/uceeepi/lom/checkpoints/lom_scale
  batch_size: 2048
  max_iters: 100_000
  log_interval: 50
  eval_interval: 500
  eval_iters: 50

wandb:
  project: latent-option-models
  entity: epignatelli_
  group: lom_scale
  dir: /scratch/uceeepi/lom/wandb
