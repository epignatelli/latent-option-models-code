# Experiment: how does LOM performance scale with codebook size?
#
# Sweeps num_options over a wide range with multiple seeds.
# All other hyperparameters are held fixed.

sweep:
  num_options_list: [4, 8, 16, 32, 64, 128, 512, 1024, 2048, 4096, 8192, 16384, 32768]
  seeds: [0, 1, 2]

data:
  nle_data_dir: /scratch/uceeepi/lom/datasets
  dataset: top10
  context_len: 128
  horizon: 128
  batch_size: 32
  num_workers: 4

model:
  latent_dim: 512
  predict_sequence: false

train:
  ckpt_dir: /scratch/uceeepi/lom/checkpoints/lom_scale
  max_iters: 100_000
  log_interval: 50
  eval_interval: 500
  eval_iters: 50

wandb:
  project: latent-option-models
  entity: epignatelli_
  group: lom_scale
  dir: /scratch/uceeepi/lom/wandb
