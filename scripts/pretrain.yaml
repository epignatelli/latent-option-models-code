# Pre-training config for the Latent Option Model (NAO Top-10, NetHack NLE)
# Run: python -m scripts.pretrain

env:                               # NLE constants — fixed by the game
  obs_h: 24
  obs_w: 80
  vocab_size: 256
  n_actions: 98

model:                             # architecture hyperparameters
  d_model: 256                     # must be divisible by n_heads
  n_layers: 4
  n_heads: 4
  context_length: 256                 # capacity: max temporal length the model supports
  latent_dim: 64
  num_options: 256
  vq_dropout: 0.1
  vq_entropy_weight: 0.01
  vq_beta: 0.25
  vq_reset_thresh: 100
  dropout: 0.0
  bias: false

data:
  dataset: top10                   # "top10" | "full"
  context_len: 4                   # c — also sets model context_length
  horizon: 8                       # k
  val_fraction: 0.05

train:
  max_iters: 100_000               # warmup_iters must be < max_iters
  batch_size: 32
  lr: 3.0e-4                       # must be > eta_min
  weight_decay: 1.0e-2
  beta1: 0.9
  beta2: 0.99
  eta_min: 1.0e-6
  warmup_iters: 1_000
  grad_clip: 1.0
  eval_interval: 500
  eval_iters: 50
  log_interval: 50
  compile_model: true
  mixed_dtype: float16
  seed: 42
  ckpt_dir: checkpoints
  resume: false

wandb:
  project: latent-option-models
  entity: latent-option-models
  group: pretrain
  dir: wandb
