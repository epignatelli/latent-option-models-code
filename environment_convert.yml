name: lom-convert
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # Build tools required by NLE
  - cmake>=3.28
  - make
  - autoconf
  - libtool
  - pkg-config
  - flex
  - bison
  - bzip2
  - zlib

  # Runtime dependencies of prepare_data.py
  - numpy>=1.26,<2
  - tqdm>=4.66
  - psutil>=5.9
  - pip

  - pip:
    - tyro>=0.8
    - nle>=0.9
